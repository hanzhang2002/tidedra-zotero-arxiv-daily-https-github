name: 更新 arXiv 数据

on:
  schedule:
    - cron: "30 10 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: 指定抓取日期（YYYY-MM-DD，留空则抓取最近几天）
        required: false
        type: string
      no_translate:
        description: 跳过 AI 翻译
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 抓取并翻译论文
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_DATE: ${{ inputs.date }}
          NO_TRANSLATE: ${{ inputs.no_translate }}
        run: |
          args=()
          if [ -n "$INPUT_DATE" ]; then args+=(--date "$INPUT_DATE"); fi
          if [ "$NO_TRANSLATE" = "true" ]; then args+=(--no-translate); fi
          python scripts/update_papers.py "${args[@]}"

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: update arXiv papers"
            git push
          fi
